version: 2
updates:
  - package-ecosystem: "npm"

    # Disable regular version updates (handled by Renovate)
    open-pull-requests-limit: 0

    ignore:
      # Ignore locally generated bridge provider packages
      - dependency-name: "@pulumi/portainer"
      - dependency-name: "@pulumi/unifi"

    schedule:
      interval: "daily"

    commit-message:
      prefix: "security"
      include: "scope"

    # CRITICAL: Force Dependabot to group security updates across these paths
    groups:
      pulumi-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
