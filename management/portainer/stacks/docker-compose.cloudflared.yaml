---
version: "3.9"

services:
  cloudflare-tunnel:
    image: cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      # Use an environment variable for the token for better security
      TUNNEL_TOKEN: $SECRET__TUNNEL_TOKEN
      NO_AUTOUPDATE: "true"
    volumes:
      - $BUILTIN__APP_CONFIG_DIR_PATH/config.yaml:/etc/cloudflared/config.yaml
    networks:
      - cfd-bridge

networks:
  cfd-bridge:
    external: true
